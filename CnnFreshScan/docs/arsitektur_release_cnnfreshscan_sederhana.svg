<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .lane-title { font: 700 21px Arial, sans-serif; fill: #111827; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 15px Arial, sans-serif; fill: #334155; }
      .note-text { font: 500 14px Arial, sans-serif; fill: #475569; }
      .label { font: 600 13px Arial, sans-serif; fill: #374151; }
      .outer { fill: #ffffff; stroke: #111827; stroke-width: 3; rx: 12; }
      .presentation { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .domain { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .data { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 10; }
      .pipeline { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 10; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .domain-box { fill: #ffffff; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .data-box { fill: #ffffff; stroke: #d97706; stroke-width: 2; rx: 10; }
      .model-box { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 10; }
      .start-end { fill: #60a5fa; stroke: #1d4ed8; stroke-width: 2; rx: 28; }
      .start-text { font: 700 17px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #1f2937; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .return { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 5; }
      .note { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 10; }
    </style>
  </defs>

  <rect x="24" y="24" width="1552" height="932" class="outer"/>
  <text x="800" y="74" text-anchor="middle" class="title">Arsitektur Release CnnFreshScan</text>

  <rect x="60" y="110" width="1480" height="205" class="presentation"/>
  <text x="84" y="142" class="lane-title">Presentation Layer - Tampilan dan State UI</text>

  <rect x="60" y="345" width="1480" height="165" class="domain"/>
  <text x="84" y="377" class="lane-title">Domain Layer - Use Case Aplikasi</text>

  <rect x="60" y="540" width="1480" height="235" class="data"/>
  <text x="84" y="572" class="lane-title">Data Layer - Pengolahan Data Citra dan Model</text>

  <rect x="60" y="805" width="1480" height="90" class="pipeline"/>
  <text x="84" y="837" class="lane-title">Inference Pipeline - TensorFlow Lite On-Device</text>

  <rect x="95" y="190" width="96" height="52" class="start-end"/>
  <text x="143" y="222" text-anchor="middle" class="start-text">Mulai</text>

  <rect x="245" y="145" width="260" height="130" class="box"/>
  <text x="375" y="176" text-anchor="middle" class="box-title">CameraScreen</text>
  <text x="272" y="207" class="box-text">- Preview kamera</text>
  <text x="272" y="232" class="box-text">- Area pindai / ROI</text>
  <text x="272" y="257" class="box-text">- Capture dan galeri</text>

  <rect x="570" y="145" width="260" height="130" class="box"/>
  <text x="700" y="176" text-anchor="middle" class="box-title">ViewModel</text>
  <text x="598" y="207" class="box-text">- Mengelola UI state</text>
  <text x="598" y="232" class="box-text">- Mengirim gambar</text>
  <text x="598" y="257" class="box-text">- Menerima hasil prediksi</text>

  <rect x="1100" y="145" width="285" height="130" class="box"/>
  <text x="1242" y="176" text-anchor="middle" class="box-title">ResultScreen</text>
  <text x="1128" y="207" class="box-text">- Foto hasil</text>
  <text x="1128" y="232" class="box-text">- Label dan confidence</text>
  <text x="1128" y="257" class="box-text">- Saran dan simpan galeri</text>

  <rect x="1430" y="190" width="96" height="52" class="start-end"/>
  <text x="1478" y="222" text-anchor="middle" class="start-text">Selesai</text>

  <rect x="265" y="410" width="300" height="70" class="domain-box"/>
  <text x="415" y="440" text-anchor="middle" class="box-title">GetRoiConfigurationUseCase</text>
  <text x="300" y="466" class="box-text">Mengatur ukuran dan posisi ROI</text>

  <rect x="670" y="400" width="300" height="90" class="domain-box"/>
  <text x="820" y="432" text-anchor="middle" class="box-title">AnalyzeProduceUseCase</text>
  <text x="703" y="460" class="box-text">Mengatur proses klasifikasi</text>
  <text x="725" y="482" class="box-text">kamera atau galeri</text>

  <rect x="1120" y="410" width="280" height="70" class="domain-box"/>
  <text x="1260" y="440" text-anchor="middle" class="box-title">ProduceRepository</text>
  <text x="1158" y="466" class="box-text">Abstraksi akses data/model</text>

  <rect x="125" y="620" width="250" height="92" class="data-box"/>
  <text x="250" y="653" text-anchor="middle" class="box-title">RepositoryImpl</text>
  <text x="158" y="682" class="box-text">Menerima bitmap dari use case</text>

  <rect x="430" y="620" width="225" height="92" class="data-box"/>
  <text x="542" y="653" text-anchor="middle" class="box-title">Crop ROI</text>
  <text x="462" y="682" class="box-text">Memotong area pindai</text>

  <rect x="710" y="620" width="250" height="92" class="data-box"/>
  <text x="835" y="653" text-anchor="middle" class="box-title">Preprocessing</text>
  <text x="742" y="682" class="box-text">Resize 224 x 224</text>
  <text x="742" y="704" class="box-text">Normalisasi [-1, 1]</text>

  <rect x="1015" y="620" width="240" height="92" class="data-box"/>
  <text x="1135" y="653" text-anchor="middle" class="box-title">Classifier</text>
  <text x="1052" y="682" class="box-text">Menjalankan TFLite</text>

  <rect x="1310" y="620" width="170" height="92" class="data-box"/>
  <text x="1395" y="653" text-anchor="middle" class="box-title">Mapping Hasil</text>
  <text x="1335" y="682" class="box-text">Label</text>
  <text x="1335" y="704" class="box-text">Confidence</text>

  <rect x="585" y="830" width="430" height="45" class="model-box"/>
  <text x="800" y="858" text-anchor="middle" class="box-title">TensorFlow Lite Model Float16 - 12 Kelas Buah dan Sayuran</text>

  <rect x="165" y="915" width="1270" height="34" class="note"/>
  <text x="800" y="938" text-anchor="middle" class="note-text">Versi release hanya memuat alur kamera, galeri, ROI, klasifikasi on-device, hasil prediksi, saran penanganan, dan simpan ke galeri.</text>

  <path d="M191 216 L245 216" class="arrow"/>
  <path d="M505 216 L570 216" class="arrow"/>
  <text x="515" y="202" class="label">event UI</text>

  <path d="M700 275 L700 400" class="arrow"/>
  <text x="714" y="340" class="label">bitmap kamera / galeri</text>

  <path d="M415 410 C415 335 395 313 382 275" class="return"/>
  <text x="264" y="345" class="label">konfigurasi ROI ke UI</text>

  <path d="M970 445 L1120 445" class="arrow"/>
  <path d="M1260 480 L1260 535 C1260 555 250 555 250 620" class="arrow"/>
  <path d="M565 445 L670 445" class="arrow"/>

  <path d="M375 666 L430 666" class="arrow"/>
  <text x="382" y="650" class="label">bitmap</text>
  <path d="M655 666 L710 666" class="arrow"/>
  <text x="662" y="650" class="label">hasil crop</text>
  <path d="M960 666 L1015 666" class="arrow"/>
  <text x="967" y="650" class="label">tensor</text>
  <path d="M1255 666 L1310 666" class="arrow"/>
  <text x="1260" y="650" class="label">probabilitas</text>

  <path d="M1135 712 C1135 780 1015 795 940 830" class="arrow"/>
  <path d="M660 830 C575 795 542 760 542 712" class="return"/>

  <path d="M1395 620 C1395 545 1330 510 1260 480" class="return"/>
  <path d="M1120 420 C1015 335 880 295 770 275" class="return"/>
  <path d="M830 216 L1100 216" class="return"/>
  <text x="910" y="199" class="label">label + confidence</text>
  <path d="M1385 216 L1430 216" class="arrow"/>
</svg>
