<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1150" viewBox="0 0 1600 1150">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #111827; }
      .layer-title { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #111827; }
      .node-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
      .node-text { font-family: Arial, sans-serif; font-size: 15px; fill: #374151; }
      .small-text { font-family: Arial, sans-serif; font-size: 14px; fill: #374151; }
      .line { stroke: #374151; stroke-width: 2.5; fill: none; }
      .debug-line { stroke: #dc2626; stroke-width: 2.5; fill: none; stroke-dasharray: 8 7; }
      .release-box { fill: #f8fafc; stroke: #334155; stroke-width: 2.5; rx: 18; }
      .debug-box { fill: #fff1f2; stroke: #dc2626; stroke-width: 2.5; rx: 18; }
      .presentation { fill: #bfdbfe; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .domain { fill: #ddd6fe; stroke: #7c3aed; stroke-width: 2; rx: 12; }
      .data { fill: #bbf7d0; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .inference { fill: #fde68a; stroke: #d97706; stroke-width: 2; rx: 12; }
      .debug { fill: #fecaca; stroke: #dc2626; stroke-width: 2; rx: 12; }
      .terminal { fill: #93c5fd; stroke: #2563eb; stroke-width: 2.5; rx: 28; }
      .legend { font-family: Arial, sans-serif; font-size: 15px; fill: #111827; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="debugArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

